server {
    server_name status.piercloud.com;

    # Backend API routes
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backoffice Admin
    location /area/ {
        alias /opt/statuspage/frontend/backoffice/dist/;
        try_files $uri $uri/ /area/index.html;
    }

    # Public Status Page
    location / {
        root /opt/statuspage/frontend/public-page/dist;
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/status.piercloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/status.piercloud.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name status.piercloud.com;
    return 301 https://$host$request_uri;
}
